<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade details · elegant table view</title>
    <!-- Google Font & simple reset -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f6fb;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(0, 10, 30, 0.15), 0 2px 6px rgba(0,0,0,0.02);
            padding: 2.2rem 2rem;
            transition: all 0.2s ease;
        }

        h2 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0a1a2f;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 1.2rem;
        }

        h2::before {
            content: '📋';
            font-size: 2rem;
            line-height: 1;
        }

        /* image / screenshot area */
        .image-panel {
            background: #f8fafd;
            border-radius: 24px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            border: 1px solid #e9edf4;
        }

        .image-placeholder {
            flex: 0 0 180px;
            height: 130px;
            background: linear-gradient(145deg, #ffffff, #f0f4fc);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #cbd5e1;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            color: #4b6584;
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .image-placeholder span {
            font-size: 2.6rem;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .image-placeholder small {
            font-size: 0.8rem;
            color: #7f8fa4;
        }

        .image-caption {
            flex: 1;
            min-width: 200px;
        }

        .image-caption p {
            color: #2c3e50;
            font-weight: 500;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }

        .image-caption .badge {
            background: #e6eefc;
            color: #1e4f8a;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .image-caption .date-highlight {
            background: #e9f2fa;
            color: #0f3b6a;
            font-weight: 600;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* grid – table style but much cleaner */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem 1.5rem;
            margin-top: 0.5rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            border-bottom: 1px dashed #e2e8f0;
            padding: 0.9rem 0 0.5rem;
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-weight: 600;
            color: #59748f;
            margin-bottom: 0.2rem;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #102a41;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* special styling for numbers, booleans, arrays */
        .detail-value.positive {
            color: #1c7e3a;
            font-weight: 600;
        }

        .detail-value.negative {
            color: #b13e3e;
        }

        .mistake-badge {
            background: #fef1e6;
            color: #a4511c;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.8rem;
        }

        .tag {
            background: #eef3f9;
            color: #254b6d;
            padding: 0.2rem 0.9rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .empty-array {
            color: #8f9fb1;
            font-style: italic;
            font-weight: 400;
            font-size: 0.95rem;
        }

        hr {
            border: none;
            border-top: 2px solid #edf2f7;
            margin: 1.8rem 0 1rem;
        }

        .psychology-section {
            background: #f0f5fe;
            border-radius: 18px;
            padding: 1.3rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .footer-note {
            color: #778da0;
            font-size: 0.85rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 1.8rem;
            gap: 0.5rem;
        }

        /* tooltip / subtle */
        .detail-value i {
            color: #6883a1;
            font-size: 0.9rem;
            font-weight: 400;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Trade journal · detailed breakdown</h2>

    <!-- dynamic content rendered by script -->
    <div id="trade-details-container">
        <!-- JavaScript will populate everything here -->
    </div>

    <div class="footer-note">
        <span>📎 data from sessionStorage</span>
        <span>•</span>
        <span>🖼️ screenshot placeholder</span>
    </div>
</div>
<script>
    (function() {
        // --- get and parse rowData from sessionStorage ---
        let rowDataString = sessionStorage.getItem("row-data");
        console.log(JSON.stringify(rowDataString));
        let tradeData = null;
        let parseError = false;

        if (rowDataString) {
            try {
                // the stored string is a JSON string which itself contains a serialized object (double‑encoded)
                // e.g. "{\"id\":\"TR001\", ...}"   -> first parse removes outer quotes and unescapes inner
                // we need to parse it twice: first to get the actual JSON string, then to get object.
                tradeData = JSON.parse(rowDataString);
            } catch (e) {
                
                // fallback: maybe it's stored as direct object string? try one parse.
                try {
                    tradeData = JSON.parse(rowDataString);
                } catch (e2) {
                    parseError = true;
                }
            }
        } else {
            parseError = true;
        }

        // --- if no valid data, use the provided sample to demonstrate design ---
        if (!tradeData && !parseError) {
            // fallback demo object (exactly the structure shown)
            tradeData = {
                "id": "TR001",
                "account": "Main Account",
                "date": "2023-10-15",
                "symbol": "EUR/USD",
                "model": "Trend Following",
                "newsImpact": "Low",
                "narrative": "Bullish",
                "bias": "Long",
                "marketConditions": "Trending",
                "tradeType": "Swing Trade",
                "session": "London",
                "entryTimeframe": "1H",
                "confluences": "Support/Resistance",
                "entrySignals": "Pin Bar",
                "orderType": "Market",
                "position": "Buy",
                "slPips": 25,
                "risk": 1.5,
                "slManagement": "Fixed",
                "actualRR": 2.5,
                "maxRR": 3.2,
                "tpManagement": "Partial Take Profit",
                "netPnl": 375,
                "mistakes": "None",
                "lessonsLearned": "Patiently waited for confirmation before entry. Good risk management.",
                "psychology": "Confident",
                "screenshotIds": []
            };
        } else if (parseError) {
            // show fallback friendly message with sample data (still demonstrate design)
            tradeData = {
                "info": "⚠️ No trade data in sessionStorage",
                "demo": "showing preview",
                "id": "TR001",
                "account": "Main Account",
                "date": "2023-10-15",
                "symbol": "EUR/USD",
                "model": "Trend Following",
                "newsImpact": "Low",
                "narrative": "Bullish",
                "bias": "Long",
                "marketConditions": "Trending",
                "tradeType": "Swing Trade",
                "session": "London",
                "entryTimeframe": "1H",
                "confluences": "Support/Resistance",
                "entrySignals": "Pin Bar",
                "orderType": "Market",
                "position": "Buy",
                "slPips": 25,
                "risk": 1.5,
                "slManagement": "Fixed",
                "actualRR": 2.5,
                "maxRR": 3.2,
                "tpManagement": "Partial Take Profit",
                "netPnl": 375,
                "mistakes": "None",
                "lessonsLearned": "Patiently waited for confirmation before entry. Good risk management.",
                "psychology": "Confident",
                "screenshotIds": []
            };
        }

        // --- helper to render a field with possible special formatting ---
        function formatValue(key, value) {
            if (value === undefined || value === null) return '<span class="empty-array">—</span>';

            if (typeof value === 'number') {
                // add sign for PnL or risk-like numbers
                if (key.toLowerCase().includes('pnl') || key === 'netPnl') {
                    const cls = value >= 0 ? 'positive' : 'negative';
                    return `<span class="${cls}">${value > 0 ? '+' : ''}${value}</span>`;
                }
                return value;
            }

            if (Array.isArray(value)) {
                if (value.length === 0) return '<span class="empty-array">empty list</span>';
                return `<div class="tag-list">${value.map(v => `<span class="tag">${escapeHtml(v)}</span>`).join('')}</div>`;
            }

            if (typeof value === 'string') {
                // highlight mistakes if they contain 'none' (case-insensitive)
                if (key === 'mistakes' && value.toLowerCase() === 'none') {
                    return `<span class="mistake-badge">⛔ no mistakes</span>`;
                }
                if (key === 'psychology') {
                    return `<span class="tag" style="background:#d9f0fe; color:#035388;">🧠 ${escapeHtml(value)}</span>`;
                }
                if (key === 'date') {
                    return `<span class="date-highlight">📅 ${escapeHtml(value)}</span>`;
                }
                return escapeHtml(value);
            }

            return escapeHtml(String(value));
        }

        // simple escape
        		// simple escape - FIXED version that handles non-strings
		// simple escape - FIXED version that handles non-strings
		function escapeHtml(unsafe) {
		    if (unsafe === null || unsafe === undefined) return '';
		    if (typeof unsafe !== 'string') {
		        unsafe = String(unsafe);
		    }
		    return unsafe
		        .replace(/&/g, "&amp;")
		        .replace(/</g, "&lt;")
		        .replace(/>/g, "&gt;")
		        .replace(/"/g, "&quot;")
		        .replace(/'/g, "&#039;");
		}
        // --- build the html ---
        let html = '';

        // ----- image / screenshot section (with best design) -----
				// ----- image / screenshot section (with ACTUAL images) -----
				const screenshotUrls = tradeData.screenshotUrls || [];
				const hasImages = screenshotUrls.length > 0;
				const tradeDate = tradeData.date || '——';
				
				html += `<div class="image-panel">`;
				
				async function renderScreenshots() {
				    const container = document.querySelector(".image-panel");
				    const screenshotIds = tradeData.screenshotIds || [];
				
				    if (screenshotIds.length === 0) return;
				
				    let html = `<div style="display:flex;gap:15px;flex-wrap:wrap;">`;
				
				    for (const id of screenshotIds) {
				        const blob = await getScreenshotById(id);
				
				        if (blob) {
				            const url = URL.createObjectURL(blob);
				
				            html += `
				                <div style="flex:0 0 180px;">
				                    <img src="${url}" style="
				                        width:100%;
				                        height:130px;
				                        object-fit:cover;
				                        border-radius:20px;
				                        border:2px solid #e9edf4;
				                        box-shadow:0 4px 10px rgba(0,0,0,0.1);
				                    ">
				                </div>
				            `;
				        }
				    }
				
				    html += `</div>`;
				    container.innerHTML = html;
				}
				
				if (hasImages) {
				    // Show actual images
				    html += `<div style="display: flex; gap: 15px; flex-wrap: wrap;">`;
				    alert(screenshotUrls)
				    renderScreenshots();
					screenshotUrls.forEach(url => {
					    html += `<div style="flex:0 0 180px;">`;
					    html += `<img src="${url}" alt="Trade screenshot"
					        style="
					            width:100%;
					            height:130px;
					            object-fit:cover;
					            border-radius:20px;
					            border:2px solid #e9edf4;
					            box-shadow:0 4px 10px rgba(0,0,0,0.1);
					        ">`;
					    html += `</div>`;
					});
				    html += `</div>`;
				} else {
				    // Show placeholder if no images
				    html += `<div class="image-placeholder">`;
				    html += `<span>🖼️</span>`;
				    html += `<strong>no screenshot</strong>`;
				    html += `<small>demo placeholder</small>`;
				    html += `</div>`;
				}
				
				html += `</div>`;

        // caption with date and id
        html += `<div class="image-caption">`;
        html += `<p><span class="badge">${escapeHtml(tradeData.id || 'TRADE')}</span> <span>${escapeHtml(tradeData.symbol || '——')}</span></p>`;
        html += `<div class="date-highlight">📅 ${escapeHtml(tradeDate)}  ·  ${escapeHtml(tradeData.session || '——')} session</div>`;
        // optional small meta
        if (tradeData.newsImpact) {
            html += `<div style="margin-top: 8px; color:#2c577c;"><span style="font-weight:500;">impact:</span> ${escapeHtml(tradeData.newsImpact)}</div>`;
        }
        html += `</div>`; // close caption
        html += `</div>`; // close image-panel

        // ----- main detail grid (all fields except the ones we already displayed or very long text) -----
        html += `<div class="details-grid">`;

        // list of keys we want in grid (almost everything except we show lessons/psychology separately)
        const excludeFromGrid = new Set(['screenshotIds', 'lessonsLearned', 'psychology', 'date', 'id', 'symbol', 'session', 'newsImpact']); 
        // date/id/symbol already shown in image panel, session+newsImpact shown in caption.
        // psychology placed after grid, lessons learned spans full width.

        for (let [key, value] of Object.entries(tradeData)) {
            if (excludeFromGrid.has(key)) continue;
            // skip internal demo key if present
            if (key === 'info' || key === 'demo') continue;

            let displayLabel = key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
            // special handling for some acronyms
            displayLabel = displayLabel.replace('Pnl', 'PnL').replace('Tp', 'TP').replace('Sl', 'SL').replace('Rr', 'RR');

            html += `<div class="detail-item">`;
            html += `<span class="detail-label">${escapeHtml(displayLabel)}</span>`;
            html += `<span class="detail-value">${formatValue(key, value)}</span>`;
            html += `</div>`;
        }

        // explicitly add fields that we may have missed: make sure netPnl, actualRR etc are there
        // but they are already included via loop, but if they were excluded by mistake? we included everything except exclude set. fine.

        html += `</div>`; // close grid

        // ----- lessons learned & psychology (full width) -----
        html += `<hr>`;

        if (tradeData.lessonsLearned) {
            html += `<div style="margin: 1.2rem 0 1.5rem;">`;
            html += `<span class="detail-label" style="font-size:0.9rem;">📌 LESSONS LEARNED</span>`;
            html += `<div style="background: #f4f9ff; padding: 1.2rem 1.5rem; border-radius: 24px; margin-top: 0.6rem; color: #0b304e; font-size: 1.05rem; line-height: 1.5; font-weight: 450; border-left: 4px solid #3f7eb0;">"${escapeHtml(tradeData.lessonsLearned)}"</div>`;
            html += `</div>`;
        }

        // psychology separate block (if exists)
        if (tradeData.psychology) {
            html += `<div class="psychology-section">`;
            html += `<span style="font-size: 2rem;">🧘</span>`;
            html += `<div><span style="font-weight:600; color:#0c4070;">Psychology: </span>`;
            html += `<strong style="background:#ffffffbb; padding:0.3rem 1rem; border-radius:30px;">${escapeHtml(tradeData.psychology)}</strong>`;
            html += `</div>`;
            // also show confluences / entry signals if present (nice touch)
            if (tradeData.confluences) {
                html += `<div style="margin-left: auto; display:flex; gap:8px;">⚡<span class="tag">${escapeHtml(tradeData.confluences)}</span></div>`;
            }
            html += `</div>`;
        } else {
            // fallback psychology from sample is present anyway
        }

        // additional fallback note if it's demo
        if (parseError || !rowDataString) {
            html += `<div style="background:#fff6e5; border-radius: 16px; padding: 0.8rem 1.5rem; margin-top: 1.5rem; border-left: 6px solid #f1b255;">`;
            html += `<span style="font-weight:500;">🔎 No sessionStorage "row-data" found. Showing preview data.</span>`;
            html += `</div>`;
        }

        // inject into container
        document.getElementById('trade-details-container').innerHTML = html;

        // additionally, if there are screenshotIds and we want to simulate a future image we could, but design already conveys.
        // also maybe adjust number styles
    })();
</script>

<!-- small note: if sessionStorage is empty, the fallback demo data uses same design, showing flexibility -->
</body>
</html>
</html>
